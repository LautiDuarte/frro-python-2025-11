<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-R-8">
    <title>Login - Sistema de Incidentes</title>
    <style>
        body { font-family: sans-serif; display: grid; place-items: center; min-height: 90vh; background-color: #f4f4f4; }
        form { background: #fff; border: 1px solid #ccc; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        form p { margin: 10px 0; }
        form input { width: 300px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>

    <form method="post">
        <h2>Iniciar Sesión</h2>

        {% csrf_token %} {% if form.errors %}
            <p class="error">Tu usuario o contraseña no son correctos. Intenta de nuevo.</p>
        {% endif %}

        {{ form.as_p }}

        <button type="submit">Entrar</button>
    </form>
</form>

<p style="margin-top: 15px;">
    ¿No tenés cuenta? 
    <a href="{% url 'register' %}">Registrate acá</a>
</p>

</body>
</html>


</body>
</html>
