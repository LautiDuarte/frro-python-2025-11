<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema de Incidentes</title>
    <style>
        body { font-family: sans-serif; display: grid; place-items: center; min-height: 90vh; background-color: #f4f4f4; }
        form { background: #fff; border: 1px solid #ccc; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        li { list-style-type: none; }
        ul { padding: 0; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .errorlist { color: red; font-size: 0.9em; }
    </style>
</head>
<body>

<form method="post">
    <h2>Crear Cuenta Nueva</h2>
    
    {% csrf_token %}
    
    {% for field in form %}
        <p>
            {{ field.label_tag }}
            {{ field }}
            {% if field.help_text %}<span class="text-xs text-gray-500">{{ field.help_text }}</span>{% endif %}
            {% if field.errors %}<div class="errorlist">{{ field.errors }}</div>{% endif %}
        </p>
    {% endfor %}
    
    <button type="submit">Registrarse</button>
</form>

<script>
    const rolField = document.getElementById('id_rol');
    const institucionFieldContainer = document.querySelector('label[for="id_institucion_asignada"]').parentNode;

    // Inicialmente ocultar el campo de institución
    institucionFieldContainer.style.display = 'none';

    function toggleInstitucionField() {
        // Obtenemos el valor seleccionado
        if (rolField.value === 'usuario') {
            institucionFieldContainer.style.display = 'block';
            // Opcional: Podrías añadir validación aquí (si se requiere)
        } else {
            institucionFieldContainer.style.display = 'none';
        }
    }

    // Ejecutar al cargar la página
    toggleInstitucionField();

    // Ejecutar al cambiar el valor del Rol
    rolField.addEventListener('change', toggleInstitucionField);

    /* --- NOTA: AJAX no es estrictamente necesario aquí porque Django's ModelChoiceField 
            ya hace el GET de todas las instituciones por ti en el backend. --- */

</script>

</body>
</html>
