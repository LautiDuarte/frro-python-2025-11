<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Sistema de Incidentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        /* Clases de utilidad */
        .form-input {
            @apply w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 mt-1;
        }
        .form-label {
            @apply block text-sm font-medium text-gray-700;
        }
        .btn {
            @apply w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white transition duration-150;
        }
        .btn-submit {
            @apply bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500;
        }
        .errorlist {
            @apply text-red-600 text-sm list-none m-0 p-0;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- Tarjeta de Registro Moderna -->
    <div class="w-full max-w-lg p-8 space-y-6 bg-white rounded-lg shadow-xl">
        
        <div class="flex justify-center">
            <!-- Icono de Registro -->
            <svg class="w-12 h-12 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
            </svg>
        </div>
        
        <h2 class="text-3xl font-bold text-center text-gray-900">Crear Cuenta Nueva</h2>
        
        <!-- Aumentamos el espaciado a space-y-6 -->
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% for field in form %}
                <!-- Contenedor para cada campo -->
                <div id="container_for_{{ field.name }}">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    
                    <!-- Dejamos que Django renderice el campo -->
                    {{ field }} 
                    
                    {% if field.errors %}
                        <div class="errorlist mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <!-- ELIMINAMOS EL CONTENEDOR DE "NUEVA INSTITUCIÓN" -->
            
            <button type="submit" class="btn btn-submit">Registrarse</button>
            <p class="text-center text-sm mt-4">¿Ya tienes cuenta? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Inicia Sesión</a></p>
        </form>
    </div>

    <!-- SCRIPTS -->
    <script>
        // --- Lógica para mostrar/ocultar campos (SIMPLIFICADA) ---
        const rolField = document.getElementById('id_rol');
        // Aseguramos que los contenedores existan antes de usarlos
        const institucionSelectContainer = document.getElementById('container_for_institucion_asignada');

        function toggleInstitucionFields() {
            if (rolField.value === 'usuario') {
                // El campo de institución aparece
                if(institucionSelectContainer) institucionSelectContainer.style.display = 'block';
            } else {
                // El campo de institución se oculta para Operador/Admin
                if(institucionSelectContainer) institucionSelectContainer.style.display = 'none';
            }
        }
        
        toggleInstitucionFields(); // Ejecutar al cargar
        rolField.addEventListener('change', toggleInstitucionFields);
    </script>

</body>
</html>
