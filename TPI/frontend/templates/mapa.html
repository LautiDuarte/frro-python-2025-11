{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Mapa de incidentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }

        .leaflet-container {
            z-index: 1000;
        }

        .sidebar {
            height: 100%;
            width: 250px;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: -240px;
            background-image: linear-gradient(to bottom, #1e3c72, #2a5298);
            background-color: #1e3c72;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            color: white;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.7);
        }

        .sidebar:hover {
            left: 0;
        }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 18px;
            color: white;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #555;
        }

        /* Estilos para botón deshabilitado */
        #btnNuevoIncidente:disabled {
            background-color: gray !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="bg-gray-100 flex flex-col h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 flex justify-between items-center relative">
        <h1 class="text-lg font-bold">Mapa de Incidentes</h1>
        <div id="mySidebar" class="sidebar">
            <h3 style="padding: 15px 25px; border-bottom: 1px solid #555;">Menú Principal</h3>

            <form id="logoutForm" method="post" action="{% url 'logout' %}" style="display: none;">
                {% csrf_token %}
            </form>

            <a href="#" onclick="document.getElementById('logoutForm').submit(); return false;">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </a>

            <a href="#">Incidentes Pendientes</a>
            <a href="#">Mi Perfil</a>
        </div>
    </header>

    <!-- Mapa -->
    <div id="map"></div>

    <div style="position: fixed; top: 100px; right: 20px; z-index: 1000;">
        <button id="btnNuevoIncidente" disabled
            style="padding: 10px 20px; background-color: gray; color: white; border: none; border-radius: 5px; cursor: not-allowed;">
            Reportar Incidente 🚨
        </button>
    </div>

    <!-- Modal Crear Incidente -->
    <div id="modalIncidente"
        class="fixed hidden inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[5000]">
        <div class="bg-white p-6 rounded-lg w-96 shadow-lg">
            <h2 class="text-lg font-bold mb-4">Nuevo Incidente</h2>
            <form id="formIncidente">
                <label class="block mb-2">Título:</label>
                <input type="text" id="titulo" class="w-full border p-2 mb-3 rounded" required>

                <label class="block mb-2">Detalle:</label>
                <textarea id="detalle" class="w-full border p-2 mb-3 rounded" rows="3" required></textarea>

                <label class="block mb-2">Gravedad:</label>
                <select id="gravedad" class="w-full border p-2 mb-3 rounded">
                    <option value="1">1 - Leve</option>
                    <option value="2">2 - Moderada</option>
                    <option value="3">3 - Grave</option>
                </select>

                <label class="block mb-2">Tipo de incidente:</label>
                <select id="tipo" class="w-full border p-2 mb-3 rounded"></select>

                <div class="flex justify-between mt-4">
                    <button type="button" id="cancelar"
                        class="bg-gray-400 text-white px-4 py-2 rounded">Cancelar</button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const map = L.map('map').setView([-32.9587, -60.6939], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const btnNuevoIncidente = document.getElementById('btnNuevoIncidente');

        // -----------------------
        // Mostrar incidentes existentes
        // -----------------------
        function cargarIncidentes() {
            fetch('/api/incidentes/')
                .then(res => res.json())
                .then(data => {
                    data.forEach(i => {
                        if (i.latitud && i.longitud) {
                            const marker = L.marker([i.latitud, i.longitud]).addTo(map);
                            marker.bindPopup(`
                                <strong>${i.titulo}</strong><br>
                                ${i.detalle}<br>
                                <em>Gravedad: ${i.gravedad}</em><br>
                                Estado: ${i.estado}
                            `);
                        }
                    });
                });
        }
        cargarIncidentes();

        // -----------------------
        // Control de selección de ubicación
        // -----------------------
        map.on('click', e => {
            if (window.tempMarker) map.removeLayer(window.tempMarker);
            window.tempMarker = L.marker(e.latlng).addTo(map);
            window.latitudSeleccionada = e.latlng.lat;
            window.longitudSeleccionada = e.latlng.lng;

            // ✅ Habilitar botón al seleccionar ubicación
            btnNuevoIncidente.disabled = false;
            btnNuevoIncidente.style.backgroundColor = '#007bff';
            btnNuevoIncidente.style.cursor = 'pointer';
        });

        // -----------------------
        // Modal de creación
        // -----------------------
        const modal = document.getElementById('modalIncidente');
        const cancelarBtn = document.getElementById('cancelar');
        const form = document.getElementById('formIncidente');

        btnNuevoIncidente.addEventListener('click', () => {
            limpiarFormulario();
            modal.classList.remove('hidden');
            cargarTiposIncidente();
        });

        cancelarBtn.addEventListener('click', () => {
            modal.classList.add('hidden');
            limpiarFormulario();
        });

        function limpiarFormulario() {
            form.reset();
        }

        // -----------------------
        // Cargar tipos de incidente
        // -----------------------
        function cargarTiposIncidente() {
            fetch('/api/tipos-incidentes/')
                .then(res => res.json())
                .then(data => {
                    const select = document.getElementById('tipo');
                    select.innerHTML = '';
                    data.forEach(t => {
                        select.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
                    });
                });
        }

        // -----------------------
        // Crear incidente
        // -----------------------
        form.addEventListener('submit', e => {
            e.preventDefault();

            const datos = {
                titulo: document.getElementById('titulo').value,
                detalle: document.getElementById('detalle').value,
                gravedad: parseInt(document.getElementById('gravedad').value),
                estado: 'Activo',
                latitud: window.latitudSeleccionada,
                longitud: window.longitudSeleccionada,
                tipo: parseInt(document.getElementById('tipo').value)
            };

            fetch('/api/incidentes/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(datos)
            })
                .then(res => {
                    if (!res.ok) throw new Error('Error al crear incidente');
                    return res.json();
                })
                .then(() => {
                    alert('Incidente creado correctamente');
                    modal.classList.add('hidden');
                    limpiarFormulario();
                    // recargar marcadores
                    map.eachLayer(layer => {
                        if (layer instanceof L.Marker) map.removeLayer(layer);
                    });
                    cargarIncidentes();

                    // volver a deshabilitar el botón hasta nueva selección
                    btnNuevoIncidente.disabled = true;
                    btnNuevoIncidente.style.backgroundColor = 'gray';
                    btnNuevoIncidente.style.cursor = 'not-allowed';
                    window.latitudSeleccionada = null;
                    window.longitudSeleccionada = null;
                    if (window.tempMarker) {
                        map.removeLayer(window.tempMarker);
                        window.tempMarker = null;
                    }
                })
                .catch(err => alert(err));
        });

        // -----------------------
        // CSRF helper
        // -----------------------
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>

</body>

</html>
