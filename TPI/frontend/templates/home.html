<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Incidentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuentes: Dancing Script (Cursiva) y Inter (Moderna y limpia para el resto) -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .cursive-font {
            font-family: 'Dancing Script', cursive;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- BARRA DE NAVEGACIÓN (Diferenciada y moderna) -->
    <nav class="sticky top-0 z-50 w-full py-4 px-6 md:px-12 flex justify-between items-center bg-white/80 backdrop-blur-md shadow-sm border-b border-gray-100">
        <!-- Logo a la izquierda -->
        <div class="flex-shrink-0 flex items-center space-x-2">
            <img class="h-12 w-auto" src="https://placehold.co/48x48/2563eb/ffffff?text=SI" alt="Logo">
            <!-- Opcional: Nombre pequeño al lado del logo si se desea -->
            <!-- <span class="font-semibold text-gray-700 hidden md:block">Sistema de Incidentes</span> -->
        </div>

        <!-- Botón de Login a la derecha -->
        <div>
            <a href="{% url 'login' %}" class="inline-flex items-center px-6 py-2.5 border border-transparent text-sm font-medium rounded-full text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all shadow-sm hover:shadow-md">
                Iniciar Sesión
            </a>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL (Centrado con márgenes amplios) -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="max-w-4xl mx-auto space-y-8">
            <!-- Título Principal Cursivo -->
            <h1 class="cursive-font text-7xl md:text-9xl text-blue-900 leading-tight drop-shadow-sm">
                Sistema de Incidentes
            </h1>
            
            <!-- Subtítulo "Protegiendo al ciudadano" -->
            <p class="text-xl md:text-2xl text-gray-500 font-light tracking-[0.2em] uppercase">
                Protegiendo al ciudadano
            </p>
        </div>
    </main>

    <!-- Pie de página minimalista (Opcional, le da un cierre visual) -->
    <footer class="py-4 text-center text-gray-400 text-sm">
        © {% now "Y" %}
    </footer>

</body>
</html>
