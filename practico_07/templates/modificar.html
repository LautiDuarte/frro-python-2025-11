<!DOCTYPE html>
<html>

<head>
  <title>Modificar Socio</title>
</head>

<body>
  <h1>Modificar Socio</h1>
  <form method="post">
    Nombre: <input name="nombre" value="{{ socio.nombre }}"><br>
    Apellido: <input name="apellido" value="{{ socio.apellido }}"><br>
    DNI: <input name="dni" value="{{ socio.dni }}"><br>
    <button type="submit">Aceptar</button>
    <a href="{{ url_for('index') }}">Cancelar</a>
  </form>
</body>

</html>
